name: My First Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print message
        run: echo "Hello from CI/CD pipeline!"

      - name: Show files
        run: ls -la

      - name: Show date
        run: date
